spring:
  application:
    name: media-service
  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://buy01:buy01@localhost:27019/buy01?authSource=admin}
  # Limits individual files (e.g., 2MB)
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 11MB
  kafka:
    bootstrap-servers: ${BROKER_URL:localhost:9092}
    consumer:
      group-id: mediaGroup
        
server:
  port: 8083
  servlet:
    context-path: /api

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}
