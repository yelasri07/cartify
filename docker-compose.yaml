services:
  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://broker:9092,PLAINTEXT://broker:19092"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      
    # volumes:
    #   - kafka-data:/var/lib/kafka/data # Map the DATA, not the LOGS

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    restart: always
    ports:
      - 8761:8761
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka
    ports:
      - 8080:8080

  user-db:
    image: mongo
    container_name: user_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27017:27017"
    volumes:
      - user_mongodb_data:/data/db

  product-db:
    image: mongo
    container_name: product_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27018:27017"
    volumes:
      - product_mongodb_data:/data/db

  media-db:
    image: mongo
    container_name: media_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27019:27017"
    volumes:
      - media_mongodb_data:/data/db

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      discovery-service:
        condition: service_healthy
      user-db:
        condition: service_started
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka
      - MONGO_URL=mongodb://buy01:buy01@user-db:27017/buy01?authSource=admin

  product-service:
    build: ./product-service
    container_name: product-service
    depends_on:
      discovery-service:
        condition: service_healthy
      product-db:
        condition: service_started
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka
      - MONGO_URL=mongodb://buy01:buy01@product-db:27017/buy01?authSource=admin

  media-service:
    build: ./media-service
    container_name: media-service
    depends_on:
      discovery-service:
        condition: service_healthy
      media-db:
        condition: service_started
      broker:
        condition: service_started
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka
      - BROKER_URL=broker:9092
      - MONGO_URL=mongodb://buy01:buy01@media-db:27017/buy01?authSource=admin
      - CLOUDINARY_URL=${CLOUDINARY_URL}

volumes:
  user_mongodb_data:
  product_mongodb_data:
  media_mongodb_data:
  # kafka-data:
