services:
  kafka:
    image: apache/kafka
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      
      # --- ADD THESE TWO LINES ---
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # ---------------------------

      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"

    # volumes:
    #   - kafka-data:/var/lib/kafka/data # Map the DATA, not the LOGS
      
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    restart: always
    ports:
      - 8761:8761
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka
    ports:
      - 8080:8080

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      discovery-service:
        condition: service_healthy
      user-db:
        condition: service_started
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka

  product-service:
    build: ./product-service
    container_name: product-service
    depends_on:
      discovery-service:
        condition: service_healthy
      product-db:
        condition: service_started
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka

  media-service:
    build: ./media-service
    container_name: media-service
    depends_on:
      discovery-service:
        condition: service_healthy
      media-db:
        condition: service_started
    environment:
      - EUREKA_SERVER=http://discovery-service:8761/eureka

  user-db:
    image: mongo
    container_name: user_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27017:27017"
    volumes:
      - user_mongodb_data:/data/db

  product-db:
    image: mongo
    container_name: product_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27018:27017"
    volumes:
      - product_mongodb_data:/data/db

  media-db:
    image: mongo
    container_name: media_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "27019:27017"
    volumes:
      - media_mongodb_data:/data/db

volumes:
  user_mongodb_data:
  product_mongodb_data:
  media_mongodb_data:
  # kafka-data:
