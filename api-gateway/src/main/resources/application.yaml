server:
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_PASSWORD:changeit}
    key-store-type: PKCS12
    key-alias: buy01
    protocol: TLS
    enabled-protocols: TLSv1.3,TLSv1.2

spring:

  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**, /auth/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
            - id: media-service
              uri: lb://media-service
              predicates:
                - Path=/media/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}