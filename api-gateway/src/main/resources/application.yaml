server:
  servlet:
    context-path: /api

spring:

  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/users/**, /auth/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/products/**
            - id: media-service
              uri: lb://media-service
              predicates:
                - Path=/media/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}