<header class="sticky top-0 z-50 w-full shadow-lg bg-primary backdrop-blur-md">
  <div class="flex items-center justify-between py-1 px-2 sm:py-3 sm:px-6">

    <!-- Logo -->
    <a routerLink="/" class="group flex items-center gap-3 logo">
      <span class="sm:text-4xl font-extrabold tracking-tight text-dark uppercase">CARTI<span
          class="text-accent">FY</span></span>
    </a>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center gap-8">
      <a routerLink="/feed" routerLinkActive="active" class="text-md relative duration-500">home</a>
    </nav>

    <!-- Auth Actions -->
    <div class="flex items-center gap-4">
      @if (isAuthenticated()) {
      <div class="relative ">
        <!-- [routerLink]="['/profile', user()?.id]" -->
        @if (user()?.role?.toString() == "SELLER") {
        <div class="profile flex items-center gap-3 cursor-pointer px-1 py-2 rounded-lg">
          <div
            class="cursor-pointer h-10 w-10 overflow-hidden rounded-full border-2 border-secondary shadow-sm transition-transform">
            <img [src]="user()?.avatar || `https://ui-avatars.com/api/?name=${user()?.name}&background=random`"
              [alt]="user()?.name" class="h-full w-full object-cover">
          </div>
          <div>
            <p class="font-semibold"> {{ user()?.name }} </p>
            <p class="text-[12px]"> {{ user()?.role }} </p>
          </div>
          <div class="arrow">
            <svg class="w-5 opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path
                d="M297.4 438.6C309.9 451.1 330.2 451.1 342.7 438.6L502.7 278.6C515.2 266.1 515.2 245.8 502.7 233.3C490.2 220.8 469.9 220.8 457.4 233.3L320 370.7L182.6 233.4C170.1 220.9 149.8 220.9 137.3 233.4C124.8 245.9 124.8 266.2 137.3 278.7L297.3 438.7z" />
            </svg>
          </div>
        </div>

        <div class="dropdown-profile-menu absolute bg-primary shadow-lg rounded-lg right-0 top-[120%] w-full">
          <div class="infos mb-4 p-4 pb-0">
            <p class="font-semibold">{{ user()?.name }}</p>
            <p class="text-[12px]">{{ user()?.email }}</p>
          </div>
          <div class="options">
            <div class="px-4 pb-2">
              <p class="flex items-center gap-2 cursor-pointer"><svg class="w-5" xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640">
                  <path
                    d="M240 192C240 147.8 275.8 112 320 112C364.2 112 400 147.8 400 192C400 236.2 364.2 272 320 272C275.8 272 240 236.2 240 192zM448 192C448 121.3 390.7 64 320 64C249.3 64 192 121.3 192 192C192 262.7 249.3 320 320 320C390.7 320 448 262.7 448 192zM144 544C144 473.3 201.3 416 272 416L368 416C438.7 416 496 473.3 496 544L496 552C496 565.3 506.7 576 520 576C533.3 576 544 565.3 544 552L544 544C544 446.8 465.2 368 368 368L272 368C174.8 368 96 446.8 96 544L96 552C96 565.3 106.7 576 120 576C133.3 576 144 565.3 144 552L144 544z" />
                </svg> <span>Show profile</span></p>
            </div>
            <div class="w-full h-px bg-accent opacity-20"></div>
            <div class="px-4 pt-2">
              <p class="flex items-center gap-2 text-red-400 cursor-pointer"><svg class="w-5 fill-red-400"
                  xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                  <path
                    d="M224 160C241.7 160 256 145.7 256 128C256 110.3 241.7 96 224 96L160 96C107 96 64 139 64 192L64 448C64 501 107 544 160 544L224 544C241.7 544 256 529.7 256 512C256 494.3 241.7 480 224 480L160 480C142.3 480 128 465.7 128 448L128 192C128 174.3 142.3 160 160 160L224 160zM566.6 342.6C579.1 330.1 579.1 309.8 566.6 297.3L438.6 169.3C426.1 156.8 405.8 156.8 393.3 169.3C380.8 181.8 380.8 202.1 393.3 214.6L466.7 288L256 288C238.3 288 224 302.3 224 320C224 337.7 238.3 352 256 352L466.7 352L393.3 425.4C380.8 437.9 380.8 458.2 393.3 470.7C405.8 483.2 426.1 483.2 438.6 470.7L566.6 342.7z" />
                </svg> <span>Log out</span></p>
            </div>
          </div>
        </div>
        }
      </div>
      } @else {
      <div class="flex items-center gap-6">
        <a routerLink="/auth/login" class="text-sm font-medium text-accent hover:text-dark transition-colors">Login</a>
        <a routerLink="/auth/register"
          class="rounded-sm bg-dark px-8 py-2.5 text-sm font-medium text-primary hover:bg-accent transition-all active:scale-95">Register</a>
      </div>
      }
    </div>

  </div>
</header>
