<section class="fixed top-0 bg-gray-900/50 right-0 h-screen w-full z-100" (click)="closeCart.emit()">
    <!-- animate.enter="enter-animation" -->
    <div class="shopping-cart bg-primary fixed right-0 h-full" (click)="$event.stopPropagation()">
        <div class="relative">
            <span (click)="closeCart.emit()"
                class="absolute right-5 top-5 text-2xl font-semibold cursor-pointer hover:text-accent">X</span>
        </div>

        <div class="cart-header text-center mt-10">
            <h3 class="text-2xl font-semibold">Shopping cart</h3>
        </div>
        <div class="cart-body p-5 mt-15">
            <div class="items flex flex-col gap-7">
                @for (item of items(); track item.id) {
                <div class="item flex gap-5">
                    <div class="images w-35 h-35 shrink-0 rounded-md overflow-hidden bg-gray-300">
                        <img class="w-full h-full object-cover" [src]="itemImage(item)">
                    </div>
                    <div class="flex flex-col justify-between">
                        <div>
                            <p> {{ item.product.name }} </p>
                            <p class="mt-1"> ${{ item.product.price * item.item_quantity }} </p>
                        </div>
                        <div class="flex gap-3 items-end">
                            <div class="quantity-counter flex w-max rounded-md overflow-hidden">
                                <button [disabled]="item.item_quantity <= 1" (click)="updateItem(item, false)"
                                    class="bg-secondary text-3xl cursor-pointer p-2"><svg class="w-5"
                                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                                        <path
                                            d="M96 320C96 302.3 110.3 288 128 288L512 288C529.7 288 544 302.3 544 320C544 337.7 529.7 352 512 352L128 352C110.3 352 96 337.7 96 320z" />
                                    </svg></button>
                                <input disabled class="[appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none
                                    bg-secondary text-center w-20" type="number" [value]="item.item_quantity">
                                <button (click)="updateItem(item, true)"
                                    class="bg-secondary text-3xl cursor-pointer p-2"><svg class="w-5"
                                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                                        <path
                                            d="M352 128C352 110.3 337.7 96 320 96C302.3 96 288 110.3 288 128L288 288L128 288C110.3 288 96 302.3 96 320C96 337.7 110.3 352 128 352L288 352L288 512C288 529.7 302.3 544 320 544C337.7 544 352 529.7 352 512L352 352L512 352C529.7 352 544 337.7 544 320C544 302.3 529.7 288 512 288L352 288L352 128z" />
                                    </svg></button>
                            </div>
                            <button class="underline cursor-pointer text-red-600">Remove</button>
                        </div>
                    </div>
                </div>
                }
            </div>
        </div>
    </div>
</section>
